<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Core Rewards Hub</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>

<body>

<!-- Animated Background -->
<div class="background">
    <div class="circle one"></div>
    <div class="circle two"></div>
    <div class="circle three"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Loading Spinner -->
<div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Connecting Wallet...</p>
</div>

<div class="container">

<header>

<div class="logo">

<i class="fa-solid fa-coins"></i>

<h1>Core Rewards Hub</h1>

</div>

<div class="header-buttons">

<button id="connectWallet" class="primary-btn">

<i class="fa-solid fa-wallet"></i>

Connect Wallet

</button>

<button id="disconnectButton" class="secondary-btn">

<i class="fa-solid fa-right-from-bracket"></i>

Disconnect

</button>

</div>

</header>

<!-- Hero -->

<section class="hero glass">

<h2>

Welcome to Core Rewards Hub

</h2>

<p>

Securely connect your wallet, monitor your CORE assets,
and access rewards from one modern dashboard.

</p>

</section>

<!-- Dashboard -->

<section class="dashboard">

<!-- Wallet Card -->

<div class="card glass">

<div class="card-header">

<i class="fa-solid fa-wallet"></i>

<h3>Wallet</h3>

</div>

<div class="card-content">

<p>

<strong>Status</strong>

</p>

<span id="status">

Not Connected

</span>

<hr>

<p>

<strong>Address</strong>

</p>

<span id="walletAddress">

-

</span>

<button id="copyButton" class="small-btn">

<i class="fa-solid fa-copy"></i>

Copy

</button>

</div>

</div>

<!-- Network Card -->

<div class="card glass">

<div class="card-header">

<i class="fa-solid fa-network-wired"></i>

<h3>Network</h3>

</div>

<div class="card-content">

<p id="network">

-

</p>

<hr>

<p>

Current Chain

</p>

<span>

Core Mainnet

</span>

</div>

</div>
